repo_name: BootsrapAgent
doctor:
  -
    kind: doctor
    cwd: .
    command: "pwd && ls -la"
    source: heuristic
    confidence: 0.8
    timeout_sec: 30
    maturity_target: none
    reason: Confirm mounted workspace and visible repository files.
  -
    kind: doctor
    cwd: .
    command: .bootstrap/venv/bin/python --version
    source: heuristic
    confidence: 0.7
    timeout_sec: 30
    maturity_target: none
    reason: Runtime presence check.
install:
  -
    kind: install
    cwd: .
    command: "apt-get update && apt-get install -y python3 python3-venv python3-pip python3-dev build-essential pkg-config"
    source: heuristic
    confidence: 0.65
    timeout_sec: 600
    maturity_target: installability
    reason: "Install Python runtime, venv support, pip, headers, and common native build tools before creating the bootstrap virtual environment."
  -
    kind: install
    cwd: .
    command: python3 -m venv .bootstrap/venv
    source: heuristic
    confidence: 0.65
    timeout_sec: 600
    maturity_target: installability
    reason: Create isolated Python virtual environment for project dependencies.
  -
    kind: install
    cwd: .
    command: .bootstrap/venv/bin/python -m pip install -U pip wheel
    source: heuristic
    confidence: 0.65
    timeout_sec: 600
    maturity_target: installability
    reason: Upgrade pip and wheel inside the bootstrap virtual environment.
  -
    kind: install
    cwd: .
    command: ".bootstrap/venv/bin/python -m pip install -e \"code[dev]\""
    source: heuristic
    confidence: 0.65
    timeout_sec: 600
    maturity_target: installability
    reason: Install Python project and test dependencies from the code package.
minimal_verify:
  kind: minimal_verify
  cwd: .
  command: .bootstrap/venv/bin/python -m compileall code
  source: heuristic
  confidence: 0.65
  timeout_sec: 300
  maturity_target: testability
  reason: Compile Python package files as a low-cost smoke test.
strongest_verify:
  kind: strongest_verify
  cwd: .
  command: .bootstrap/venv/bin/python -m pytest code/tests
  source: heuristic
  confidence: 0.7
  timeout_sec: 1200
  maturity_target: testability
  reason: Run the project test suite.
run_probe: null
